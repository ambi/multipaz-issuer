ktor {
    deployment {
        port = 8081
        port = ${?PORT}
        # グレースフルシャットダウン: SIGTERM 後も処理中リクエストを最大 15 秒待つ
        gracePeriodMillis = 5000
        shutdownTimeoutMillis = 15000
    }
    application {
        modules = [org.vdcapps.verifier.ApplicationKt.module]
    }
}

verifier {
    # Public base URL of this server (no trailing slash)
    baseUrl = "http://localhost:8081"
    baseUrl = ${?BASE_URL}

    # 信頼する発行者証明書の PEM ファイルパス（複数証明書を含めてよい）。
    # 未設定時は警告を出力して証明書検証をスキップする（開発用）。
    # 本番環境では必ず設定すること。
    trustedIssuerCertPath = ""
    trustedIssuerCertPath = ${?TRUSTED_ISSUER_CERT}
}

session {
    # Redis URL を指定すると Redis にセッションを保存する。未設定はインメモリ。
    # 例: redis://localhost:6379  redis://:password@host:6379/0
    redisUrl = ""
    redisUrl = ${?REDIS_URL}
}
