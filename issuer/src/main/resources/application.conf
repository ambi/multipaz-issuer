ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        # グレースフルシャットダウン: SIGTERM 後も処理中リクエストを最大 15 秒待つ
        gracePeriodMillis = 5000
        shutdownTimeoutMillis = 15000
    }
    application {
        modules = [org.vdcapps.issuer.ApplicationKt.module]
    }
}

issuer {
    # Public base URL of this server (no trailing slash)
    baseUrl = "http://localhost:8080"
    baseUrl = ${?BASE_URL}

    # PKCS12 keystore for the issuer signing key
    keyStorePath = "issuer-keystore.p12"
    keyStorePath = ${?KEY_STORE_PATH}
    # KEY_STORE_PASSWORD は必須。デフォルト値なし（セキュリティ上の理由）
    keyStorePassword = ${KEY_STORE_PASSWORD}

    issuingCountry = "JP"
    issuingCountry = ${?ISSUING_COUNTRY}
    issuingAuthority = "VDC Apps Issuer"
    issuingAuthority = ${?ISSUING_AUTHORITY}

    # Credential validity in days
    credentialValidityDays = 365

    # Number of trusted reverse proxies in front of this server.
    # Used to correctly extract the client IP from X-Forwarded-For (prevents spoofing).
    # Set to 1 when deployed behind a single load balancer (e.g. Fly.io, nginx).
    trustedProxyCount = 1
    trustedProxyCount = ${?TRUSTED_PROXY_COUNT}
}

session {
    # Redis URL を指定すると Redis にセッションを保存する。未設定はインメモリ。
    # 例: redis://localhost:6379  redis://:password@host:6379/0
    redisUrl = ""
    redisUrl = ${?REDIS_URL}

    # c_nonce 署名用 HMAC-SHA256 シークレット（hex エンコード、32 バイト = 64 文字）
    # 複数インスタンス間で nonce を相互検証するために必要。
    # 未設定の場合は起動ごとにランダムキーが生成される（単一インスタンスのみ有効）。
    # 生成方法: openssl rand -hex 32
    nonceHmacSecret = ""
    nonceHmacSecret = ${?NONCE_HMAC_SECRET}
}

entra {
    tenantId = ${ENTRA_TENANT_ID}
    clientId = ${ENTRA_CLIENT_ID}
    clientSecret = ${ENTRA_CLIENT_SECRET}
    redirectUri = "http://localhost:8080/auth/callback"
    redirectUri = ${?ENTRA_REDIRECT_URI}
}
